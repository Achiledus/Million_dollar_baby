<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <link href="fonts/Typefesse/Typefesse_Claire-Obscure.otf" rel="stylesheet">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/styling.css">
    <title>Questions</title>
</head>
<body>
    <header class="page_header"><h4 id="home_click">Who wants a Milli ...</h4></header>
    <main>
        <div id="paused_overlay"></div>
        <div class="just_for_alignment">
            <div id="time_and_exit">
                <button id="timer">00:00</button>
                <div id="walk_away_container"> 
                    <span>Walk away</span>
                    <button id="accept_defeat" >$000</button>
                </div>
                <div class="pop_up_walkaway" id="surrender">
                    <div class="overlay" id="surrender_overlay"></div>
                    <div id="walkaway_text_container">
                        <p>Are you sure</br>
                            you want end the game here</br>
                            with <span id="cash_back">$000,000.00</span></p>
                        <div id="surrender_buttons_container">
                            <button class="surrender_buttons" id="bitch_out">Yeh, I'm sorry</button>
                            <button class="surrender_buttons" id="fat_finger">Nah, fat fingers</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
       
        <div id="asked_question">
            <div id="amount_display"> $25,000</div>
            <div id="question_display">
                <!-- Lorem, ipsum dolor sit amet consectetur adipisicing elit. <br> 
                Obcaecati at porro magni ab. Minima, esse. <br>
                Distinctio maxime molestiae dolor obcaecati animi accusamus architecto, <br>
                officiis voluptates fuga ducimus assumenda! Exercitationem, iusto. <br> -->
            </div>
        </div>

        <div id="question_options">
           <label for="option_a" class="option_container" id="container_0">
                <input type="radio" name="options" id="option_a" class="option_" value="0">
                <div class="audience_voted" style="--width: 10" id="audience_0"></div>
                <p id="option_text_0">a. options 1</p>
            </label>

            <label for="option_b" class="option_container" id="container_1">
                <input type="radio" name="options" id="option_b" class="option_" value="1">
                <div class="audience_voted" style="--width: 10" id="audience_1"></div>
                <p id="option_text_1">b. options 2</p>
            </label>

            <label for="option_c" class="option_container" id="container_2">
                <input type="radio" name="options" id="option_c" class="option_" value="2">
                <div class="audience_voted" style="--width: 10" id="audience_2"></div>
                <p id="option_text_2">c. options 3</p>
            </label>

            <label for="option_d" class="option_container" id="container_3">
                <input type="radio" name="options" id="option_d" class="option_" value="3">
                <div class="audience_voted" style="--width: 10" id="audience_3"></div>
                <p id="option_text_3">d. options 4</p>
            </label>
            <button id="final_answer">
                Final Answer?
            </button>

            
            <div class="pop_up" id="nq_popup">
                <div class="overlay"></div>
                <div class="popup-content" id = "correct_popup">
                    <div class="correct">
                        <img src="./images/right_sign.svg" alt="correct checkmark">
                        <h2>Ka-ching !!</h2>
                    </div>
                    <p>You have won<br> <b class="just_won">$25,000</b></p>
                    <div class="next_action">
                        <button class="basic_button" id="continue_button">continue</button>
                        <button id="cowards_out"> away with my money </button>
                    </div>
                </div>
                <div class="popup-content" id = "wrong_popup">
                    <div class="correct">
                        <img src="./images/wron_sign.svg" alt="wrong checkmark">
                        <h2>You're Broke and Dumb!</h2>
                    </div>
                    <p>You lose all of your<br> <b class="just_won">$25,000</b></p>
                    <div class="next_action">
                        <button class="basic_button" id="try_again_button">Try again</button>
                        <button id ="give_up_button"> Go Home </button>
                    </div>
                </div>
            </div>
        </div>


        <div id="game_life_lines">
            <button class="life_line_button" id="fifty_fifty">
                <img src="./images/row-vertical.svg" alt="50/50 options">
            </button>
            <button class="life_line_button" id="phone_friend">
                <img src="./images/call-calling.svg" alt="50/50 options">
            </button>

            <div id="phone_friend_response">
                <div class="overlay"></div>
                <div id="friend_choice">
                    <p id="friend_message">{message}</p>
                    <div class="button_holder">
                        <button class="surrender_buttons" id="accept"> I trust it</button>
                        <button class="surrender_buttons" id="think_for_self">Nah, can't be</button>
                    </div>
                </div>
            </div>

            <button class="life_line_button" id="ask_audience">
                <img src="./images/people.svg" alt="50/50 options">
            </button>
        </div>

        <div class="joke_ads">
            This is an Ad
        </div>
    </main>
    <footer class="footer_float">
        <P>this is some randome text placeholder. copyright since 2026</P>
    </footer>
    <script src="./scripts/script.js"></script>
    <script src="./scripts/gameLogic.js"></script>
</body>
</html>
